<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edem | Sign In / Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --accent: #c5a059;
        --text: #ffffff;
        --muted: #b8b8b8;
        --border: rgba(197, 160, 89, 0.35);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        background: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 45%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .auth-wrap {
        width: min(470px, 100%);
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0.8rem;
        padding: 1.4rem;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }

      .brand {
        font-family: "Cormorant Garamond", serif;
        color: var(--accent);
        letter-spacing: 0.18em;
        font-size: 1.5rem;
        margin-bottom: 0.3rem;
      }

      .title {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        margin-bottom: 0.6rem;
      }

      .order-note {
        color: var(--muted);
        margin-bottom: 1rem;
        font-size: 0.95rem;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.45rem;
        margin-bottom: 1rem;
      }

      .tab-btn {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--accent);
        padding: 0.55rem 0.8rem;
        cursor: pointer;
        transition: 0.25s ease;
      }

      .tab-btn.active {
        background: var(--accent);
        color: #111;
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      .field {
        display: grid;
        gap: 0.4rem;
        margin-bottom: 0.75rem;
      }

      .field label {
        color: #ddd;
        font-size: 0.9rem;
      }

      .field input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #0e0e0e;
        color: #fff;
        padding: 0.7rem 0.8rem;
        transition: border-color 0.25s ease, transform 0.25s ease;
      }

      .field input:focus {
        outline: none;
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .submit-btn {
        width: 100%;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #111;
        padding: 0.65rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.3rem;
        transition: transform 0.25s ease, filter 0.25s ease;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.08);
      }

      .back-link {
        display: inline-block;
        margin-top: 1rem;
        color: var(--accent);
        text-decoration: none;
        transition: opacity 0.25s ease;
      }

      .back-link:hover {
        opacity: 0.82;
      }
    </style>
  </head>
  <body>
    <div class="auth-wrap">
      <p class="brand">EDEM</p>
      <h1 class="title">Continue to Order</h1>
      <p class="order-note" id="orderNote">Sign in or create an account to continue.</p>

      <div class="tabs">
        <button class="tab-btn active" data-tab="signin">Sign In</button>
        <button class="tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <form class="panel active" id="signinPanel">
        <div class="field">
          <label for="signinEmail">Email</label>
          <input id="signinEmail" type="email" required />
        </div>
        <div class="field">
          <label for="signinPassword">Password</label>
          <input id="signinPassword" type="password" required />
        </div>
        <button class="submit-btn" type="submit">Sign In & Continue</button>
      </form>

      <form class="panel" id="signupPanel">
        <div class="field">
          <label for="signupName">Full Name</label>
          <input id="signupName" type="text" required />
        </div>
        <div class="field">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" required />
        </div>
        <div class="field">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" type="password" required />
        </div>
        <button class="submit-btn" type="submit">Create Account & Continue</button>
      </form>

      <a class="back-link" href="index.html">← Back to Edem</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
      // Entry animation for auth page
      gsap.fromTo(
        ".auth-wrap",
        { y: 36, opacity: 0, scale: 0.98 },
        { y: 0, opacity: 1, scale: 1, duration: 0.8, ease: "power3.out" }
      );
      gsap.from([".brand", ".title", "#orderNote", ".tab-btn", ".back-link"], {
        y: 12,
        opacity: 0,
        duration: 0.6,
        stagger: 0.08,
        delay: 0.2,
        ease: "power2.out",
      });
      // Initial panel animation
      gsap.fromTo(
        "#signinPanel .field, #signinPanel .submit-btn",
        { y: 18, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.45, stagger: 0.08, ease: "power2.out", delay: 0.5 }
      );
    </script>
    <script type="module" src="auth.js"></script>
  </body>
</html>
